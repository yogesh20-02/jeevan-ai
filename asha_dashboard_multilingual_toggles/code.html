<script>
function showAddPatient() { document.getElementById('add_patient_form').classList.remove('hidden'); }
function hideAddPatient() { document.getElementById('add_patient_form').classList.add('hidden'); }

async function submitHealthTest() {
  const msg = document.getElementById('test_msg');
  const btn = document.getElementById('test_btn');
  const vitals = {
    patient_id: document.getElementById('test_patient_id').value.trim(),
    bp_systolic: parseInt(document.getElementById('test_bp_sys').value)||120,
    bp_diastolic: parseInt(document.getElementById('test_bp_dia').value)||80,
    blood_sugar: parseInt(document.getElementById('test_sugar').value)||100,
    oxygen_level: parseInt(document.getElementById('test_oxygen').value)||98,
    pulse_rate: parseInt(document.getElementById('test_pulse').value)||72,
    temperature: parseFloat(document.getElementById('test_temp').value)||98.6,
    age: parseInt(document.getElementById('test_age').value)||40,
    symptoms: document.getElementById('test_symptoms').value||'none'
  };
  if (!vitals.patient_id) {
    msg.className='p-4 rounded-xl text-sm font-bold bg-red-500/20 text-red-400';
    msg.textContent='⚠️ Please enter Patient Jeevan ID!'; return;
  }
  btn.textContent='🤖 Calculating AI Risk...';
  msg.className='p-4 rounded-xl text-sm font-bold bg-blue-500/20 text-blue-400';
  msg.textContent='Sending vitals to Gemini AI...';
  try {
    const user = getUser();
    const risk = await calcRisk(vitals);
    await sb.post('health_tests',{...vitals, risk_score:risk.crs, risk_level:risk.risk_level,
      rvi:risk.rvi, advice_hindi:risk.advice_hindi, recorded_by:user?.jeevan_id});
    await sb.patch('patients',`jeevan_id=eq.${vitals.patient_id}`,{risk_score:risk.crs, risk_level:risk.risk_level});
    
    // Show result
    document.getElementById('res_crs').textContent = risk.crs;
    document.getElementById('res_level').textContent = risk.risk_level;
    document.getElementById('res_level').className = 'text-3xl font-black ' + 
      (risk.risk_level==='CRITICAL'?'text-red-400':risk.risk_level==='HIGH'?'text-orange-400':risk.risk_level==='MEDIUM'?'text-yellow-400':'text-green-400');
    document.getElementById('res_rvi').textContent = risk.rvi?.toFixed(1)||'0';
    document.getElementById('res_doctor').textContent = risk.see_doctor?'⚠️ YES':'✅ NO';
    document.getElementById('res_hindi').textContent = risk.advice_hindi;
    document.getElementById('risk_result').classList.remove('hidden');
    
    msg.className='p-4 rounded-xl text-sm font-bold bg-green-500/20 text-green-400';
    msg.textContent=`✅ Saved! CRS: ${risk.crs} | Level: ${risk.risk_level}`;
    btn.textContent='🤖 Calculate Risk & Save';
    
    if (risk.emergency) {
      localStorage.setItem('current_alert',JSON.stringify({patient_name:vitals.patient_id, patient_id:vitals.patient_id}));
      setTimeout(() => go.alert(), 2000);
    }
    loadPatients();
  } catch(e) {
    msg.className='p-4 rounded-xl text-sm font-bold bg-red-500/20 text-red-400';
    msg.textContent='❌ Error: '+e.message; btn.textContent='🤖 Calculate Risk & Save';
  }
}

async function loadPatients() {
  const user = getUser();
  if (!user) { go.ashaLogin(); return; }
  document.getElementById('asha_dash_name').textContent = user.full_name || user.jeevan_id;
  try {
    const patients = await sb.get('patients','order=risk_score.desc&select=*');
    const list = document.getElementById('patient_list');
    if (!patients || patients.length===0) {
      list.innerHTML='<p class="text-primary/50 text-sm text-center py-4">No patients yet.<br>Add your first patient!</p>'; return;
    }
    document.getElementById('total_patients').textContent = patients.length;
    document.getElementById('critical_count').textContent = patients.filter(p=>p.risk_level==='CRITICAL').length;
    document.getElementById('high_count').textContent = patients.filter(p=>p.risk_level==='HIGH').length;
    document.getElementById('stable_count').textContent = patients.filter(p=>p.risk_level==='LOW'||p.risk_level==='MEDIUM').length;
    const colors={CRITICAL:'border-red-500 bg-red-500/10',HIGH:'border-orange-500 bg-orange-500/10',MEDIUM:'border-yellow-500 bg-yellow-500/10',LOW:'border-green-500 bg-green-500/10'};
    const dots={CRITICAL:'🔴',HIGH:'🟠',MEDIUM:'🟡',LOW:'🟢'};
    list.innerHTML = patients.map(p=>`
      <div class="p-3 rounded-xl border ${colors[p.risk_level||'LOW']} cursor-pointer hover:brightness-110">
        <div class="flex justify-between items-center">
          <div>
            <p class="text-white text-sm font-bold">${p.full_name||'Unknown'}</p>
            <p class="text-slate-400 text-xs">${p.jeevan_id}</p>
          </div>
          <div class="text-right">
            <p class="text-white font-black">${dots[p.risk_level||'LOW']} ${p.risk_score||0}</p>
            <p class="text-slate-400 text-xs">${p.risk_level||'LOW'}</p>
          </div>
        </div>
      </div>`).join('');
  } catch(e) { console.log('Error loading patients:', e); }
}

document.addEventListener('DOMContentLoaded', loadPatients);

// ── LOADING OVERLAY HTML (inject once) ───
function injectLoader() {
  if (document.getElementById('jeevan-loader')) return;
  const el = document.createElement('div');
  el.id = 'jeevan-loader';
  el.innerHTML = `
    <style>
      #jeevan-loader {
        display:none; position:fixed; inset:0;
        background:rgba(2,8,24,0.97); z-index:99999;
        flex-direction:column; align-items:center;
        justify-content:center; gap:20px; font-family:'Public Sans',sans-serif;
      }
      #jeevan-loader .jl-title {
        background:linear-gradient(to right,#F492F0,#2EF2E2);
        -webkit-background-clip:text; -webkit-text-fill-color:transparent;
        font-size:24px; font-weight:900; letter-spacing:4px;
      }
      #jeevan-loader .jl-msg {
        color:white; font-size:15px; font-weight:600; letter-spacing:2px;
      }
      #jeevan-loader .jl-dot { animation:jlBlink 1.5s infinite; }
      #jeevan-loader .jl-dot:nth-child(2){animation-delay:.3s}
      #jeevan-loader .jl-dot:nth-child(3){animation-delay:.6s}
      #jeevan-loader .jl-track {
        position:relative; width:220px; height:36px;
        background:#1a1a1a; border-radius:18px; overflow:hidden;
      }
      #jeevan-loader .jl-fill {
        position:absolute; top:3px; left:3px;
        height:calc(100% - 6px); width:0%;
        background:linear-gradient(90deg,#2EF2E2,#7B2FFF,#F492F0);
        border-radius:15px;
        animation:jlFill 2.2s ease-out forwards, jlHue 2.2s linear infinite;
        box-shadow:0 0 12px rgba(46,242,226,.4);
      }
      #jeevan-loader .jl-sub {
        color:rgba(255,255,255,.3); font-size:11px; letter-spacing:3px; text-transform:uppercase;
      }
      @keyframes jlBlink{0%,49%{opacity:1}50%,100%{opacity:0}}
      @keyframes jlFill{0%{width:0}30%{width:30%}70%{width:70%}100%{width:calc(100% - 6px)}}
      @keyframes jlHue{0%{filter:hue-rotate(0deg)}100%{filter:hue-rotate(360deg)}}
    </style>
    <div class="jl-title">JEEVAN AI</div>
    <div class="jl-msg" id="jl-msg">Loading<span class="jl-dot">.</span><span class="jl-dot">.</span><span class="jl-dot">.</span></div>
    <div class="jl-track"><div class="jl-fill" id="jl-fill"></div></div>
    <div class="jl-sub" id="jl-sub">NEURAL NETWORK</div>
  `;
  document.body.appendChild(el);
}

function showLoader(msg, sub, dest, delay) {
  injectLoader();
  document.getElementById('jl-msg').innerHTML = (msg||'Loading') +
    '<span class="jl-dot">.</span><span class="jl-dot">.</span><span class="jl-dot">.</span>';
  if (sub) document.getElementById('jl-sub').textContent = sub;
  const fill = document.getElementById('jl-fill');
  fill.style.animation = 'none'; fill.offsetHeight;
  fill.style.animation = 'jlFill 2.2s ease-out forwards, jlHue 2.2s linear infinite';
  document.getElementById('jeevan-loader').style.display = 'flex';
  if (dest) setTimeout(() => { window.location.href = dest; }, delay || 2200);
}

// ── SESSION HELPERS ───────────────────────
function getUser()    { try { return JSON.parse(localStorage.getItem('jeevan_user')); } catch(e) { return null; } }
function setUser(u)   { localStorage.setItem('jeevan_user', JSON.stringify(u)); }
function clearUser()  { localStorage.removeItem('jeevan_user'); }
function logout()     { clearUser(); go.home(); }
function generateId(role) {
  const n = Math.floor(1000 + Math.random() * 9000);
  return role==='patient'?`PAT-${n}`:role==='asha'?`ASH-${n}`:`DOC-${n}`;
}

// ── SUPABASE HELPERS ──────────────────────
const sb = {
  headers: () => ({
    'Content-Type': 'application/json',
    'apikey': SUPABASE_KEY,
    'Authorization': `Bearer ${SUPABASE_KEY}`,
    'Prefer': 'return=representation'
  }),
  post: async (table, body) => {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
      method:'POST', headers: sb.headers(), body: JSON.stringify(body)
    });
    return r.json();
  },
  get: async (table, query) => {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${query}`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    return r.json();
  },
  patch: async (table, filter, body) => {
    await fetch(`${SUPABASE_URL}/rest/v1/${table}?${filter}`, {
      method:'PATCH', headers: sb.headers(), body: JSON.stringify(body)
    });
  }
};

// ── LOGIN FUNCTION ────────────────────────
async function loginUser(jeevan_id, password, role) {
  const table = role==='patient'?'patients':role==='asha'?'asha_workers':'doctors';
  const data = await sb.get(table, `jeevan_id=eq.${jeevan_id}&password=eq.${password}&select=*`);
  if (data && data.length > 0) {
    setUser({...data[0], role});
    return { success:true, user:data[0] };
  }
  return { success:false };
}

// ── GEMINI AI RISK ────────────────────────
async function calcRisk(v) {
  const r = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`,
    { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ contents:[{ parts:[{ text:
        `You are JEEVAN AI. Rural India patient vitals:
BP:${v.bp_systolic}/${v.bp_diastolic} Sugar:${v.blood_sugar} O2:${v.oxygen_level}% Pulse:${v.pulse_rate} Temp:${v.temperature}F Age:${v.age} Symptoms:${v.symptoms||'none'}
Reply ONLY valid JSON no markdown:
{"crs":0-100,"risk_level":"LOW/MEDIUM/HIGH/CRITICAL","rvi":0.0,"advice_hindi":"2 lines","advice_english":"2 lines","see_doctor":true/false,"emergency":true/false}`
      }]}]})
    });
  const data = await r.json();
  const txt = data.candidates[0].content.parts[0].text.replace(/```json|```/g,'').trim();
  return JSON.parse(txt);
}

// ── LIVE TIMESTAMP ────────────────────────
function startClock(id) {
  const el = document.getElementById(id);
  if (!el) return;
  const tick = () => { el.textContent = new Date().toISOString().replace('T',' // ').replace(/\.\d+Z/,' UTC'); };
  tick(); setInterval(tick,1000);
}

// AUTO START CLOCK IF ELEMENT EXISTS
document.addEventListener('DOMContentLoaded', () => startClock('timestamp'));
