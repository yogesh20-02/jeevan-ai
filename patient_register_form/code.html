<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/><meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<title>Patient Registration | JEEVAN AI</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>tailwind.config={darkMode:"class",theme:{extend:{colors:{"primary":"#A4F000","accent":"#2EF2E2","dark-void":"#020818"},fontFamily:{display:["Public Sans"]}}}}</script>
<style>
.animated-bg{background:linear-gradient(-45deg,#020818,#003F3A,#020818);background-size:400% 400%;animation:gradient 15s ease infinite}
@keyframes gradient{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.glass-card{background:rgba(0,63,58,.2);backdrop-filter:blur(20px);border:1px solid transparent;border-image:linear-gradient(to bottom right,#A4F000,transparent,#2EF2E2) 1}
.btn-gradient{background:linear-gradient(135deg,#A4F000 0%,#003F3A 100%);transition:all .3s}
.btn-gradient:hover{background:linear-gradient(135deg,#2EF2E2 0%,#A4F000 100%);box-shadow:0 0 20px rgba(164,240,0,.4)}
.particle-header{background:linear-gradient(to right,#A4F000,#003F3A);position:relative;overflow:hidden}
.particle-header::after{content:"";position:absolute;inset:0;background-image:radial-gradient(#A4F000 1px,transparent 1px);background-size:20px 20px;opacity:.2}
</style>
</head>
<body class="font-display animated-bg min-h-screen text-slate-100">
<div class="px-4 md:px-20 lg:px-40 flex flex-1 justify-center py-10">
<div class="flex flex-col max-w-[960px] w-full">
<div class="glass-card rounded-xl overflow-hidden shadow-2xl">
  <header class="particle-header flex items-center justify-between px-8 py-6">
    <div class="flex items-center gap-4 text-dark-void">
      <div class="bg-dark-void p-2 rounded-lg"><span class="material-symbols-outlined text-primary text-2xl">clinical_notes</span></div>
      <h2 class="text-dark-void text-xl font-black uppercase">Patient Registration</h2>
    </div>
    <button onclick="go.home()" class="flex items-center justify-center rounded-full h-10 w-10 bg-dark-void/20 hover:bg-dark-void/40 text-dark-void">
      <span class="material-symbols-outlined">close</span>
    </button>
  </header>
  <div class="p-8">
    <div class="mb-8 border-l-4 border-primary pl-6 py-2 bg-primary/5">
      <h1 class="text-primary text-3xl font-bold">Create Patient Profile</h1>
      <p class="text-accent/70 text-sm mt-1">Secure health data entry</p>
    </div>
    <div class="space-y-8">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <label class="flex flex-col gap-2">
          <p class="text-primary text-xs font-black tracking-widest uppercase">First Name</p>
          <div class="relative group">
            <input id="pat_first" class="w-full bg-dark-void/40 border-b-2 border-primary/30 focus:border-accent focus:ring-0 text-white placeholder:text-slate-500 py-4 transition-all" placeholder="e.g. Ravi" type="text"/>
            <span class="absolute right-2 top-4 text-primary/50 material-symbols-outlined">person</span>
          </div>
        </label>
        <label class="flex flex-col gap-2">
          <p class="text-primary text-xs font-black tracking-widest uppercase">Last Name</p>
          <div class="relative group">
            <input id="pat_last" class="w-full bg-dark-void/40 border-b-2 border-primary/30 focus:border-accent focus:ring-0 text-white placeholder:text-slate-500 py-4 transition-all" placeholder="e.g. Kumar" type="text"/>
            <span class="absolute right-2 top-4 text-primary/50 material-symbols-outlined">badge</span>
          </div>
        </label>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <label class="flex flex-col gap-2">
          <p class="text-primary text-xs font-black tracking-widest uppercase">Mobile Number</p>
          <input id="pat_phone" class="w-full bg-dark-void/40 border-b-2 border-primary/30 focus:border-accent focus:ring-0 text-white placeholder:text-slate-500 py-4" placeholder="+91 XXXXX XXXXX" type="text"/>
        </label>
        <label class="flex flex-col gap-2">
          <p class="text-primary text-xs font-black tracking-widest uppercase">Age</p>
          <input id="pat_age" class="w-full bg-dark-void/40 border-b-2 border-primary/30 focus:border-accent focus:ring-0 text-white placeholder:text-slate-500 py-4" placeholder="e.g. 45" type="number"/>
        </label>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <label class="flex flex-col gap-2">
          <p class="text-primary text-xs font-black tracking-widest uppercase">Village</p>
          <input id="pat_village" class="w-full bg-dark-void/40 border-b-2 border-primary/30 focus:border-accent focus:ring-0 text-white placeholder:text-slate-500 py-4" placeholder="e.g. Rampur" type="text"/>
        </label>
        <label class="flex flex-col gap-2">
          <p class="text-primary text-xs font-black tracking-widest uppercase">Password</p>
          <input id="pat_password" class="w-full bg-dark-void/40 border-b-2 border-primary/30 focus:border-accent focus:ring-0 text-white placeholder:text-slate-500 py-4" placeholder="Create password" type="password"/>
        </label>
      </div>
      <div class="flex flex-col gap-2">
        <p class="text-primary text-xs font-black tracking-widest uppercase mb-2">Gender</p>
        <div class="flex flex-wrap gap-3">
          <label class="group relative cursor-pointer"><input checked class="peer absolute opacity-0" name="gender" type="radio" value="Male"/>
            <div class="px-5 py-2 rounded-full border border-primary/30 text-xs font-bold text-primary/60 peer-checked:bg-primary peer-checked:text-dark-void transition-all">MALE</div></label>
          <label class="group relative cursor-pointer"><input class="peer absolute opacity-0" name="gender" type="radio" value="Female"/>
            <div class="px-5 py-2 rounded-full border border-primary/30 text-xs font-bold text-primary/60 peer-checked:bg-primary peer-checked:text-dark-void transition-all">FEMALE</div></label>
          <label class="group relative cursor-pointer"><input class="peer absolute opacity-0" name="gender" type="radio" value="Other"/>
            <div class="px-5 py-2 rounded-full border border-primary/30 text-xs font-bold text-primary/60 peer-checked:bg-primary peer-checked:text-dark-void transition-all">OTHER</div></label>
        </div>
      </div>
      <div id="pat_msg" class="hidden p-4 rounded-xl text-sm font-bold"></div>
      <button onclick="handlePatientRegister()" class="btn-gradient w-full py-5 rounded-xl text-dark-void font-black text-sm tracking-[.2em] uppercase flex items-center justify-center gap-3">
        <span id="pat_btn_text">Register Patient</span>
        <span class="material-symbols-outlined">bolt</span>
      </button>
      <p class="text-center text-slate-500 text-sm">Already registered? 
        <span onclick="go.patientLogin()" class="text-primary cursor-pointer hover:underline font-bold">Login here</span></p>
    </div>
  </div>
</div>
</div>
</div>
<script>
async function handlePatientRegister() {
  const btn = document.getElementById('pat_btn_text');
  const msg = document.getElementById('pat_msg');
  msg.className = 'p-4 rounded-xl text-sm font-bold';
  msg.style.display = 'block';

  const first    = document.getElementById('pat_first').value.trim();
  const last     = document.getElementById('pat_last').value.trim();
  const phone    = document.getElementById('pat_phone').value.trim();
  const age      = document.getElementById('pat_age').value.trim();
  const village  = document.getElementById('pat_village').value.trim();
  const password = document.getElementById('pat_password').value.trim();
  const gender   = document.querySelector('input[name="gender"]:checked')?.value || 'Male';

  if (!first || !phone || !password) {
    msg.className += ' bg-red-500/20 text-red-400';
    msg.textContent = '⚠️ Please fill First Name, Mobile Number and Password!';
    return;
  }

  btn.textContent = 'Creating...';

  try {
    const jeevan_id = generateId('patient');
    const payload = {
      jeevan_id,
      full_name: `${first} ${last}`.trim(),
      phone,
      age: parseInt(age) || 0,
      gender,
      village: village || '',
      password,
      role: 'patient',
      risk_score: 0,
      risk_level: 'LOW'
    };

    console.log('Sending to Supabase:', payload);

    const response = await fetch(`${SUPABASE_URL}/rest/v1/patients`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Prefer': 'return=representation'
      },
      body: JSON.stringify(payload)
    });

    const result = await response.json();
    console.log('Supabase response status:', response.status);
    console.log('Supabase response body:', result);

    if (response.ok && !result.error) {
      setUser({ jeevan_id, full_name: payload.full_name, role: 'patient' });
      localStorage.setItem('new_jeevan_id', jeevan_id);
      msg.className += ' bg-green-500/20 text-green-400';
      msg.textContent = `✅ Success! Your JEEVAN ID: ${jeevan_id} — Save this!`;
      setTimeout(() => go.success(), 1500);
    } else {
      const errMsg = result?.message || result?.error || JSON.stringify(result);
      msg.className += ' bg-red-500/20 text-red-400';
      msg.textContent = '❌ Supabase Error: ' + errMsg;
      btn.textContent = 'Register Patient';
    }
  } catch(e) {
    console.error('Registration error:', e);
    msg.className += ' bg-red-500/20 text-red-400';
    msg.textContent = '❌ Network Error: ' + e.message;
    btn.textContent = 'Register Patient';
  }
}

const SUPABASE_URL = "https://dsvbnrhsawfoiqwjnskb.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRzdmJucmhzYXdmb2lxd2puc2tiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MTE0MTYsImV4cCI6MjA4ODk4NzQxNn0.JE7I1MUp51ubUunPlsgRr2V8Rq-7LLQ6Qp5gw05zl4w";
const GEMINI_KEY   = "AIzaSyC5LOL5e7Ic4Z5UGGIlMloh_4vA7MfxIrA";

const PAGES = {
  home:           '../jeevan_ai_advanced_front_page/code.html',
  roleSelect:     '../enhanced_role_selection/code.html',
  patientReg:     '../patient_register_form/code.html',
  ashaReg:        '../asha_registration_with_otp_field/code.html',
  doctorReg:      '../doctor_register_form/code.html',
  patientLogin:   '../patient_login/code.html',
  ashaLogin:      '../asha_worker_login/code.html',
  doctorLogin:    '../doctor_login_animated_refinement/code.html',
  patientDash:    '../patient_dashboard_multilingual_toggles/code.html',
  ashaDash:       '../asha_dashboard_multilingual_toggles/code.html',
  doctorDash:     '../doctor_dashboard_multilingual_toggles/code.html',
  success:        '../success_screen/code.html',
  alert:          '../alert_screen/code.html',
};

function injectLoader() {
  if (document.getElementById('jeevan-loader')) return;
  const el = document.createElement('div');
  el.id = 'jeevan-loader';
  el.innerHTML = `
    <style>
      #jeevan-loader {
        display:none; position:fixed; inset:0;
        background:rgba(2,8,24,0.97); z-index:99999;
        flex-direction:column; align-items:center;
        justify-content:center; gap:20px; font-family:'Public Sans',sans-serif;
      }
      #jeevan-loader .jl-title {
        background:linear-gradient(to right,#F492F0,#2EF2E2);
        -webkit-background-clip:text; -webkit-text-fill-color:transparent;
        font-size:24px; font-weight:900; letter-spacing:4px;
      }
      #jeevan-loader .jl-msg { color:white; font-size:15px; font-weight:600; letter-spacing:2px; }
      #jeevan-loader .jl-dot { animation:jlBlink 1.5s infinite; }
      #jeevan-loader .jl-dot:nth-child(2){animation-delay:.3s}
      #jeevan-loader .jl-dot:nth-child(3){animation-delay:.6s}
      #jeevan-loader .jl-track { position:relative; width:220px; height:36px; background:#1a1a1a; border-radius:18px; overflow:hidden; }
      #jeevan-loader .jl-fill { position:absolute; top:3px; left:3px; height:calc(100% - 6px); width:0%;
        background:linear-gradient(90deg,#2EF2E2,#7B2FFF,#F492F0); border-radius:15px;
        animation:jlFill 2.2s ease-out forwards, jlHue 2.2s linear infinite;
        box-shadow:0 0 12px rgba(46,242,226,.4); }
      #jeevan-loader .jl-sub { color:rgba(255,255,255,.3); font-size:11px; letter-spacing:3px; text-transform:uppercase; }
      @keyframes jlBlink{0%,49%{opacity:1}50%,100%{opacity:0}}
      @keyframes jlFill{0%{width:0}30%{width:30%}70%{width:70%}100%{width:calc(100% - 6px)}}
      @keyframes jlHue{0%{filter:hue-rotate(0deg)}100%{filter:hue-rotate(360deg)}}
    </style>
    <div class="jl-title">JEEVAN AI</div>
    <div class="jl-msg" id="jl-msg">Loading<span class="jl-dot">.</span><span class="jl-dot">.</span><span class="jl-dot">.</span></div>
    <div class="jl-track"><div class="jl-fill" id="jl-fill"></div></div>
    <div class="jl-sub" id="jl-sub">NEURAL NETWORK</div>
  `;
  document.body.appendChild(el);
}

function showLoader(msg, sub, dest, delay) {
  injectLoader();
  document.getElementById('jl-msg').innerHTML = (msg||'Loading') +
    '<span class="jl-dot">.</span><span class="jl-dot">.</span><span class="jl-dot">.</span>';
  if (sub) document.getElementById('jl-sub').textContent = sub;
  const fill = document.getElementById('jl-fill');
  fill.style.animation = 'none'; fill.offsetHeight;
  fill.style.animation = 'jlFill 2.2s ease-out forwards, jlHue 2.2s linear infinite';
  document.getElementById('jeevan-loader').style.display = 'flex';
  if (dest) setTimeout(() => { window.location.href = dest; }, delay || 2200);
}

const go = {
  home:         () => showLoader('Going Home',        'JEEVAN AI',            PAGES.home),
  register:     () => showLoader('Loading Register',  'SELECT YOUR ROLE',     PAGES.roleSelect),
  ashaReg:      () => showLoader('ASHA Registration', 'PREPARING FORM',       PAGES.ashaReg),
  doctorReg:    () => showLoader('Doctor Portal',     'PREPARING FORM',       PAGES.doctorReg),
  patientReg:   () => showLoader('Patient Portal',    'PREPARING FORM',       PAGES.patientReg),
  ashaLogin:    () => showLoader('ASHA Login',        'AUTHENTICATING',       PAGES.ashaLogin),
  doctorLogin:  () => showLoader('Doctor Login',      'AUTHENTICATING',       PAGES.doctorLogin),
  patientLogin: () => showLoader('Patient Login',     'AUTHENTICATING',       PAGES.patientLogin),
  ashaDash:     () => showLoader('ASHA Dashboard',    'LOADING YOUR DATA',    PAGES.ashaDash),
  doctorDash:   () => showLoader('Doctor Dashboard',  'LOADING YOUR DATA',    PAGES.doctorDash),
  patientDash:  () => showLoader('Patient Dashboard', 'LOADING YOUR DATA',    PAGES.patientDash),
  success:      () => showLoader('Success!',          'SAVING YOUR PROFILE',  PAGES.success),
  alert:        () => showLoader('EMERGENCY',         'ALERTING CONTACTS',    PAGES.alert),
};

function getUser()   { try { return JSON.parse(localStorage.getItem('jeevan_user')); } catch(e) { return null; } }
function setUser(u)  { localStorage.setItem('jeevan_user', JSON.stringify(u)); }
function clearUser() { localStorage.removeItem('jeevan_user'); }
function logout()    { clearUser(); go.home(); }
function generateId(role) {
  const n = Math.floor(1000 + Math.random() * 9000);
  return role==='patient'?`PAT-${n}`:role==='asha'?`ASH-${n}`:`DOC-${n}`;
}

document.addEventListener('DOMContentLoaded', () => {
  const el = document.getElementById('timestamp');
  if (el) setInterval(() => { el.textContent = new Date().toISOString().replace('T',' // ').replace(/\.\d+Z/,' UTC'); }, 1000);
});
</script>
</body></html>
